<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StaticSitesV10</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />

    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link href="StaticSitesV10.styles.css" rel="stylesheet" />

    <link rel="icon" type="image/png" href="favicon.png" />

    <!-- Icon Font Stylesheet -->
    <!--<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">-->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Global Themes -->
    <link id="globalThemeVariables" href="css/themes/default/variables.css" rel="stylesheet" />
    <link id="globalTheme" href="css/themes/default/app.css" rel="stylesheet" />

    <!-- Tenant Specific Themes -->
    <link id="tenantThemeVariables" href="demo-demo/css/variables.css" rel="stylesheet" />
    <link id="tenantTheme" href="demo-demo/css/app.css" rel="stylesheet" />

    <script type="importmap"></script>

    <script>
        /* =========================
           Wait for DOM to stabilize
           ========================= */
        function waitForStableDOM(doc, timeout = 8000) {
            return new Promise(resolve => {
                let lastChange = Date.now();

                const observer = new MutationObserver(() => {
                    lastChange = Date.now();
                });

                observer.observe(doc, {
                    childList: true,
                    subtree: true,
                    attributes: true
                });

                const interval = setInterval(() => {
                    if (Date.now() - lastChange > 1000) {
                        observer.disconnect();
                        clearInterval(interval);
                        resolve();
                    }
                }, 500);

                setTimeout(() => {
                    observer.disconnect();
                    clearInterval(interval);
                    resolve();
                }, timeout);
            });
        }

        /* =========================
           Full Offline Export
           ========================= */
        window.fullOfflineExport = async (url) => {
            return new Promise((resolve, reject) => {

                const iframe = document.createElement("iframe");
                iframe.style.position = "fixed";
                iframe.style.left = "-9999px";
                iframe.style.width = "1400px";
                iframe.style.height = "900px";

                iframe.onload = async () => {
                    try {
                        const doc = iframe.contentDocument;

                        // 🔥 KEY FIX: wait for rendering to finish
                        await waitForStableDOM(doc);

                        const clone = doc.documentElement.cloneNode(true);

                        /* =========================
                           CLEANING
                           ========================= */

                        // Remove scripts
                        clone.querySelectorAll("script").forEach(e => e.remove());

                        // Remove Blazor/framework attributes
                        const walker = document.createTreeWalker(clone, NodeFilter.SHOW_ELEMENT);
                        while (walker.nextNode()) {
                            const el = walker.currentNode;

                            [...el.attributes].forEach(attr => {
                                if (
                                    attr.name.startsWith("_blazor") ||
                                    attr.name.startsWith("blazor:") ||
                                    attr.name.startsWith("b-")
                                ) {
                                    el.removeAttribute(attr.name);
                                }
                            });
                        }

                        // Remove comments
                        const removeComments = (node) => {
                            for (let i = node.childNodes.length - 1; i >= 0; i--) {
                                const child = node.childNodes[i];
                                if (child.nodeType === Node.COMMENT_NODE) {
                                    node.removeChild(child);
                                } else {
                                    removeComments(child);
                                }
                            }
                        };
                        removeComments(clone);

                        /* =========================
                           INLINE CSS
                           ========================= */
                        let cssText = "";
                        for (let sheet of doc.styleSheets) {
                            try {
                                for (let rule of sheet.cssRules) {
                                    cssText += rule.cssText;
                                }
                            } catch { }
                        }

                        const styleTag = doc.createElement("style");
                        styleTag.textContent = cssText;
                        clone.querySelector("head")?.appendChild(styleTag);

                        // Remove external stylesheets
                        clone.querySelectorAll('link[rel="stylesheet"]').forEach(e => e.remove());

                        /* =========================
                           INLINE IMAGES (BASE64)
                           ========================= */
                        const images = clone.querySelectorAll("img");

                        for (let img of images) {
                            try {
                                const response = await fetch(img.src);
                                const blob = await response.blob();

                                const reader = new FileReader();
                                const base64 = await new Promise(res => {
                                    reader.onloadend = () => res(reader.result);
                                    reader.readAsDataURL(blob);
                                });

                                img.src = base64;
                            } catch {
                                // ignore failures
                            }
                        }

                        const html = "<!DOCTYPE html>\n" + clone.outerHTML;

                        document.body.removeChild(iframe);
                        resolve(html);

                    } catch (err) {
                        document.body.removeChild(iframe);
                        reject("Export failed (likely CORS or iframe blocked)");
                    }
                };

                iframe.onerror = () => {
                    document.body.removeChild(iframe);
                    reject("Failed to load URL");
                };

                iframe.src = url;
                document.body.appendChild(iframe);
            });
        };

        /* =========================
           Download helper
           ========================= */
        window.downloadFile = (filename, content) => {
            const blob = new Blob([content], { type: "text/html" });
            const a = document.createElement("a");

            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
        };
    </script>



</head>
